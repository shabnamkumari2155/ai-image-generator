<!DOCTYPE html>
<html>

<head>
<title>AI Image Generator</title>
</head>

<body>

<h2>AI Image Generator</h2>

<input id="prompt" placeholder="Type your prompt">

<button onclick="generateImage()">Generate Image</button>

<br><br>

<img id="image" width="400" style="border:1px solid black;">

<script>

function generateImage(){

let prompt = document.getElementById("prompt").value;

let encodedPrompt = encodeURIComponent(prompt);

let url = "https://image.pollinations.ai/prompt/" + encodedPrompt + "?width=512&height=512&seed=" + Math.random();

document.getElementById("image").src = url;

}

</script>

</body>

</html>
